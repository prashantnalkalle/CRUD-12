<!DOCTYPE html>
<html>
	<head>
		<title>task</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
		<link rel ="stylesheet" href ="./assests/css/style.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	</head>
	<body>
		<div class="container-fluid mt-5">
			<div class="row">
				<div class="col-md-6 offset-md-3">
					<div class="card">
						<div class="card-header bg-primary">
							<h2>Comment Cards Form</h2>
						</div>
						<div class="card-body">
							<form action="" id="inputform">
								<div class="form-group">
									<label for="name" class="font-weight-bold">Name*</label>
									<input type="text" class="form-control" id="name">
								</div>
								<div class="form-group">
									<label for="email" class="font-weight-bold">Email*</label>
									<input type="email" class="form-control" id="email">
								</div>
								<div class="form-group">
									<label for="body" class="font-weight-bold">Comment*</label>
									<textarea rows="4" class="form-control" id="body"></textarea>
								</div>
								<div class="form-group">
									<label for="postId" class="font-weight-bold">PostID*</label>
									<select class="form-control" id="postId">
										<option value="1">1</option>
										<option value="2">2</option>
										<option value="3">3</option>
										<option value="4">4</option>
										<option value="5">5</option>
										<option value="6">6</option>
										<option value="7">7</option>
										<option value="8">8</option>
										<option value="9">9</option>
										<option value="10">10</option>
									</select>
								</div>
								<button class="btn btn-primary btn-sm btn-block" id="addpost">Add Post</button>
								<button type="button" class="btn btn-success btn-sm btn-block d-none" id="updatepost">Update Post</button>

							</form>
						</div>
					</div>
				</div>
			</div>
			<div class="row mt-5" id="cardcontainer">
				<!-- <div class="col-md-4 offset-md-2">
					<div class="card">
						<div class="card-header">
							<h2>Email : </h2>
						</div>
						<div class="card-body">
							<h3>NAME : </h3>
							<p></p>
						</div>
						<div class="card-footer d-flex justify-content-between">
							<button class="btn btn-primary btn-sm " id="editbtn">Edit</button>
							<button class="btn btn-danger btn-sm " id="deletebtn">Remove</button>

						</div>
					</div>
				</div> -->

			</div>
			<div class="spinner" id="spinner">
				<div class="spinner-border text-primary" role="status">
  					<span class="sr-only">Loading...</span>
				</div>
			</div>
					
			
		</div>
		
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script src="./assests/js/app.js"></script>
	</body>
</html>
